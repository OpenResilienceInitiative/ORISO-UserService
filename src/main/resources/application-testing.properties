# ---------------- Logging ----------------
server.port=8082
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG

# ---------------- Keycloak ----------------
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080/auth}
keycloak.realm=${KEYCLOAK_REALM:testing}
keycloak.bearer-only=true
keycloak.resource=app
keycloak.principal-attribute=preferred_username
keycloak.cors=false
keycloak.use-resource-role-mappings=false
keycloak.config.admin-username=${KEYCLOAK_CONFIG_ADMIN_USERNAME:test-admin}
keycloak.config.admin-password=${KEYCLOAK_CONFIG_ADMIN_PASSWORD:test-password}
keycloak.config.admin-client-id=admin-cli
keycloak.config.app-client-id=app

# ---------------- Identity Management ----------------
identity.technical-user.username=test-technical-user
identity.technical-user.password=test-technical-user-password
identity.openid-connect-url=http://localhost:8080/auth/realms/testing/.well-known/openid-configuration

# ---------------- Test Database ----------------
# Scaled for 5000 concurrent users
# Configuration must be provided via ConfigMap/Secrets (environment variables)
# Use Kubernetes DNS names, e.g., jdbc:mariadb://mariadb.caritas.svc.cluster.local:3306/userservice
# NOT hardcoded IPs like jdbc:mariadb://10.43.123.72:3306/userservice
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:userservice-testing;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:test}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.maxLifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:database/UserServiceDatabase.sql

# ---------------- Rocket.Chat ----------------
rocket.technical.username=${ROCKET_TECHNICAL_USERNAME:technical}
rocket.technical.password=${ROCKET_TECHNICAL_PASSWORD:secret}
rocket.systemuser.id=${ROCKET_SYSTEMUSER_ID:}
rocket.systemuser.username=${ROCKET_SYSTEMUSER_USERNAME:}
rocket.systemuser.password=${ROCKET_SYSTEMUSER_PASSWORD:}
rocket-chat.credential-cron=0 */10 * * * ?
rocket-chat.base-url=${ROCKET_CHAT_BASE_URL:https://testing.com/api/v1}
rocket-chat.mongo-url=${ROCKET_CHAT_MONGO_URL:mongodb://localhost:27017/testing}

# ---------------- Liquibase ----------------
spring.liquibase.enabled=false
# Database already exists, skip Liquibase migration

# ---------------- Local App Settings ----------------
app.base.url=${APP_BASE_URL:http://localhost:8082}
multitenancy.enabled=false
appointments.delete-job-enabled=true
appointments.lifespan-in-hours=3

# ---------------- Agency Service URL ----------------
agency.service.api.url=${AGENCY_SERVICE_API_URL:}

# ---------------- CSRF (match admin app) ----------------
csrf.header.property=X-CSRF-Token
csrf.cookie.property=CSRF-TOKEN
csrf.whitelist.header.property=X-CSRF-Token
csrf.whitelist.config-uris=/users/data,\
  /users/sessions/askers,\
  /service/users/sessions/,\
  /users/sessions/,\
  /actuator/health,\
  /actuator/health/**,\
  /actuator/loggers,\
  /actuator/loggers/**
tenant.service.api.url=${TENANT_SERVICE_API_URL:http://localhost:8084}
consulting.type.service.api.url=${CONSULTING_TYPE_SERVICE_API_URL:http://localhost:8083}

# ---------------- Spring Boot MongoDB connection ----------------
# Use Kubernetes DNS names, e.g., mongodb://mongodb.caritas.svc.cluster.local:27017/userservice
# NOT hardcoded IPs like mongodb://10.43.61.124:27017/userservice
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:}
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:}
keycloak.ssl-required=none
matrix.apiUrl=${MATRIX_API_URL:http://localhost:8008}
matrix.registrationSharedSecret=${MATRIX_REGISTRATION_SHARED_SECRET:secret}
